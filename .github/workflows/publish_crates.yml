name: Publish package on crates.io

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # Required for OIDC

jobs:
  package:
    name: Publish Rust package
    runs-on: ubuntu-latest
    environment:
      name: crates
      url: https://crates.io/crates/tree-sitter-batch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{vars.RUST_TOOLCHAIN || 'stable'}}
      - name: Set up tree-sitter CLI
        uses: tree-sitter/setup-action/cli@v2
      - name: Regenerate parser
        run: |
          while read -r grammar_dir; do
            pushd "$grammar_dir"
            tree-sitter generate
            popd > /dev/null
          done < <(jq -r '.grammars[].path // "."' tree-sitter.json)
      - name: Sync version from tree-sitter.json
        run: |
          VERSION=$(jq -r .metadata.version tree-sitter.json)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
      - name: Set up registry token
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
