name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run corpus tests
        run: tree-sitter test
      - name: Parse example .bat files (integration test)
        run: tree-sitter parse examples/*.bat --quiet --stat
      - name: Assert zero parse errors on search.bat fixture
        run: |
          output=$(tree-sitter parse examples/search.bat)
          if echo "$output" | grep -qE '\(ERROR|MISSING'; then
            echo "search.bat has parse errors:"
            echo "$output" | grep -E '\(ERROR|MISSING' | head -20
            exit 1
          fi
          echo "search.bat parsed cleanly with no ERROR or MISSING nodes."
