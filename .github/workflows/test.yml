name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run corpus tests
        run: tree-sitter test
      - name: Parse example .bat/.cmd files (integration test)
        run: tree-sitter parse examples/*.bat examples/*.cmd --quiet --stat
      - name: Assert zero parse errors on real-world fixtures
        run: |
          for fixture in \
            examples/search.bat \
            examples/dope.bat \
            examples/2note2.bat \
            examples/AddPaths.bat \
            examples/AutoRun.cmd \
            examples/CheckEOL.bat \
            examples/TimeX.bat \
            examples/mvn.cmd \
          ; do
            output=$(tree-sitter parse "$fixture")
            if echo "$output" | grep -qE '\(ERROR|MISSING'; then
              echo "$fixture has parse errors:"
              echo "$output" | grep -E '\(ERROR|MISSING' | head -20
              exit 1
            fi
            echo "$fixture parsed cleanly with no ERROR or MISSING nodes."
          done
